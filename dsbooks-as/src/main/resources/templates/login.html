<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login com DSBooks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<main class="login-card">
    <h1 class="login--title">Login com DSBooks</h1>

    <p th:if="${param.error}" class="login-message login-message--error">
        Email ou senha inválidos
    </p>
    <p th:if="${param.logout}" class="login-message login-message--success">
        Sessão encerrada
    </p>

    <form th:action="@{/login}" method="post" class="login-form" autocomplete="off">
        <label for="username" class="login-label">Email</label>
        <input id="username" type="email" name="username" class="login-input" required autofocus/>

        <label for="password" class="login-label">Senha</label>
        <div class="login-input-wrapper">
            <input id="password" type="password" name="password" class="login-input" required
                   autocomplete="new-password"/>

            <button id="togglePassword" type="button" class="login-input-toggle" aria-label="Mostrar senha"
                    aria-pressed="false">
                <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off is-hidden" xmlns="http://www.w3.org/2000/svg"
                     viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 0 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
            </button>
        </div>

        <button type="submit" class="login-button">Entrar</button>
    </form>
</main>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
